<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>280班网站</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; 
            background: #f4f1eb; 
            color: #2c2c2c; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        
        /* 头部导航 */
        .site-header { 
            background: #3e2723; 
            color: #fff; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .header-inner { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 12px 16px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .logo { 
            font-size: 1.3em; 
            font-weight: 700; 
            white-space: nowrap; 
            flex-shrink: 0;
        }
        .main-nav { 
            display: flex; 
            gap: 4px; 
            flex: 1; 
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .main-nav::-webkit-scrollbar { display: none; }
        .nav-item { 
            color: rgba(255,255,255,0.8); 
            text-decoration: none; 
            padding: 8px 14px; 
            border-radius: 20px; 
            font-size: 0.95em; 
            transition: 0.2s; 
            white-space: nowrap; 
            cursor: pointer; 
            user-select: none;
            flex-shrink: 0;
        }
        .nav-item:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .nav-item.active { background: rgba(255,255,255,0.25); color: #fff; font-weight: 600; }
        .admin-link { 
            color: #ffcc80; 
            text-decoration: none; 
            font-size: 0.9em; 
            border: 1px solid #ffcc80; 
            padding: 6px 12px; 
            border-radius: 20px; 
            white-space: nowrap; 
            transition: 0.2s; 
            flex-shrink: 0;
        }
        .admin-link:hover { background: #ffcc80; color: #3e2723; }
        
        /* 主内容区 */
        .module-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px 16px; 
            min-height: calc(100vh - 56px); 
        }
        .empty { 
            text-align: center; 
            padding: 60px 20px; 
            color: #999; 
            font-size: 1.1em; 
        }
        
        /* 通用页面 */
        .generic-page { 
            background: #fff; 
            border-radius: 12px; 
            padding: 24px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); 
        }
        .generic-page h1 { 
            font-size: 1.6em; 
            color: #3e2723; 
            border-bottom: 2px solid #d7ccc8; 
            padding-bottom: 12px; 
            margin-bottom: 20px; 
        }
        
        /* 历史书 */
        .book-layout { display: flex; gap: 24px; }
        .book-toc { 
            width: 240px; 
            background: #fff; 
            border-radius: 12px; 
            padding: 20px; 
            position: sticky; 
            top: 80px; 
            height: fit-content; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); 
        }
        .book-toc h3 { font-size: 1em; color: #666; margin-bottom: 12px; }
        .toc-item { 
            padding: 10px 12px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 0.95em; 
            margin-bottom: 6px; 
            transition: 0.15s; 
            line-height: 1.4;
        }
        .toc-item:hover { background: #f5f0e8; }
        .toc-item.active { background: #e8d5c4; color: #5d4037; font-weight: 600; }
        .book-content { flex: 1; min-width: 0; }
        .welcome-hint { color: #999; text-align: center; padding: 60px 0; font-size: 1.1em; }
        .book-content h1 { 
            font-size: 1.8em; 
            color: #3e2723; 
            border-bottom: 2px solid #d7ccc8; 
            padding-bottom: 12px; 
            margin-bottom: 24px; 
        }
        .bk-section { 
            background: #fff; 
            border-radius: 10px; 
            padding: 20px 24px; 
            margin-bottom: 20px; 
            box-shadow: 0 1px 6px rgba(0,0,0,0.06); 
        }
        .bk-section h4 { 
            font-size: 0.9em; 
            color: #8d6e63; 
            margin-bottom: 12px; 
            letter-spacing: 1px; 
            font-weight: 600;
        }
        .bk-section p { 
            margin-bottom: 12px; 
            line-height: 1.8; 
            text-indent: 2em; 
            font-size: 1em;
        }
        .bk-section.preface { border-left: 4px solid #81c784; }
        .bk-section.body { border-left: 4px solid #64b5f6; }
        .bk-section.exercises { border-left: 4px solid #ffb74d; }
        .bk-section.extension { border-left: 4px solid #ba68c8; }
        
        /* 公告栏 */
        .notice-list { display: flex; flex-direction: column; gap: 16px; }
        .notice-card { 
            background: #fff; 
            border-radius: 12px; 
            padding: 20px 24px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); 
        }
        .notice-date { font-size: 0.85em; color: #999; margin-bottom: 8px; }
        .notice-title { font-size: 1.3em; color: #3e2723; margin-bottom: 12px; font-weight: 600; }
        .notice-body p { line-height: 1.8; margin-bottom: 10px; font-size: 1em; }
        
        /* 小说 */
        .novel-card { 
            background: #fff; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 16px; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.08); 
            display: flex; 
            gap: 16px; 
        }
        .novel-cover { 
            width: 120px; 
            height: 160px; 
            object-fit: cover; 
            border-radius: 8px; 
            cursor: pointer; 
            flex-shrink: 0; 
        }
        .novel-info { flex: 1; }
        .novel-title { font-size: 1.3em; color: #3e2723; margin-bottom: 8px; font-weight: 600; }
        .novel-meta { font-size: 0.9em; color: #999; margin-bottom: 10px; display: flex; gap: 12px; }
        .novel-intro { color: #666; font-size: 1em; line-height: 1.7; margin-bottom: 12px; }
        .novel-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .novel-actions button { 
            background: #f5f0e8; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 0.95em; 
            transition: 0.2s; 
        }
        .novel-actions button:hover { background: #e8d5c4; }
        .like-btn { color: #e57373; font-weight: 600; }
        .novel-body { 
            color: #444; 
            line-height: 1.8; 
            margin-top: 12px; 
            display: none; 
            font-size: 1em;
        }
        
        /* 投稿表单 */
        .editor-box { 
            margin-top: 16px; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid #eee;
        }
        label { 
            display: block; 
            margin: 14px 0 6px; 
            font-weight: 600; 
            font-size: 0.9em; 
            color: #555; 
        }
        input, textarea, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 1em; 
            font-family: inherit; 
            background: #fff;
        }
        textarea { min-height: 80px; resize: vertical; }
        textarea.big { min-height: 200px; }
        .btn-primary { 
            background: #8d6e63; 
            color: #fff; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1em; 
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-primary:hover { background: #6d4c41; }
        .actions { margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
        
        /* 讨论区 */
        .item-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            padding: 14px 16px; 
            background: #f9f9f9; 
            border-radius: 10px; 
            margin-bottom: 10px; 
            font-size: 1em; 
            line-height: 1.6;
        }
        .sugg-date { font-size: 0.85em; color: #999; margin-left: 8px; }
        
        /* 图片遮罩 */
        .img-overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            z-index: 999; 
            justify-content: center; 
            align-items: center; 
        }
        .img-overlay img { max-width: 95vw; max-height: 95vh; border-radius: 8px; }
        
        /* ===== 日常分享板块样式 ===== */
        .post-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .post-content {
            line-height: 1.8;
            margin-bottom: 12px;
            font-size: 1em;
            white-space: pre-wrap;
        }
        .post-images {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .post-images img {
            height: 200px;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
            object-fit: cover;
        }
        .post-video {
            margin-top: 12px;
        }
        .post-actions {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .post-actions button {
            background: #f5f0e8;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95em;
            transition: 0.2s;
        }
        .post-actions button:hover {
            background: #e8d5c4;
        }
        .like-btn {
            color: #e57373;
            font-weight: 600;
        }
        .post-comments {
            margin-top: 14px;
            border-top: 1px solid #eee;
            padding-top: 14px;
        }
        .comment-item {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 6px;
            font-size: 0.9em;
        }
        .comment-item strong {
            font-size: 0.95em;
        }
        .comment-item div {
            margin-top: 4px;
            line-height: 1.6;
        }
        
        /* ===== 手机端适配 ===== */
        @media (max-width: 768px) {
            .header-inner { padding: 10px 12px; }
            .logo { font-size: 1.1em; }
            .nav-item { font-size: 0.9em; padding: 6px 10px; }
            .admin-link { font-size: 0.85em; padding: 5px 10px; }
            
            .module-content { padding: 12px; }
            .generic-page { padding: 16px; }
            .generic-page h1 { font-size: 1.4em; }
            
            .book-layout { flex-direction: column; }
            .book-toc { 
                width: 100%; 
                position: static; 
                display: flex; 
                flex-wrap: wrap; 
                gap: 8px; 
                padding: 12px; 
            }
            .book-toc h3 { width: 100%; margin-bottom: 8px; }
            .toc-item { 
                font-size: 0.85em; 
                padding: 6px 10px; 
                margin-bottom: 0;
            }
            
            .book-content h1 { font-size: 1.5em; }
            .bk-section { padding: 16px; }
            .bk-section p { font-size: 1.05em; line-height: 1.9; }
            
            .notice-card { padding: 16px; }
            .notice-title { font-size: 1.2em; }
            
            .novel-card { flex-direction: column; }
            .novel-cover { width: 100%; height: 200px; }
            .novel-title { font-size: 1.2em; }
            
            .item-row { flex-direction: column; }
            .item-row > div:last-child { margin-top: 10px; }
            
            input, textarea, select { font-size: 16px; }
            
            .post-images img {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1 class="logo">🏫 280班</h1>
            <nav class="main-nav" id="mainNav"></nav>
            <a href="admin.html" class="admin-link">管理</a>
        </div>
    </header>

    <main class="module-content" id="moduleContent"></main>

    <div class="img-overlay" id="imgOverlay" onclick="closeOverlay()">
        <img id="overlayImg" src="" />
    </div>

    <script>
        // ===== Supabase 配置 =====
        const SUPABASE_URL = 'https://gbktpjnitqpwomcprrol.supabase.co';   // ← 替换
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdia3Rwam5pdHFwd29tY3Bycm9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MTk2NDIsImV4cCI6MjA5ODk5NTY0Mn0.TIp9NAdDRZrI16Jq_no7Ga9EpX7ooc6b5Ck7r-sNqww';                // ← 替换

        async function supabaseRequest(table, method = 'GET', data = null, id = null) {
            const url = id 
                ? `${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`
                : `${SUPABASE_URL}/rest/v1/${table}`;
            const options = {
                method: method,
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation'
                }
            };
            if (data && (method === 'POST' || method === 'PATCH')) {
                options.body = JSON.stringify(data);
            }
            const res = await fetch(url, options);
            if (method === 'DELETE') return { ok: true };
            return res.json();
        }

        // ===== 工具函数 =====
        function openOverlay(src) { 
            document.getElementById('overlayImg').src = src; 
            document.getElementById('imgOverlay').style.display = 'flex'; 
        }
        function closeOverlay() { 
            document.getElementById('imgOverlay').style.display = 'none'; 
        }
        function formatText(text) { 
            if (!text) return ''; 
            return text.split('\n').filter(l => l.trim()).map(l => `<p>${escapeHtml(l)}</p>`).join(''); 
        }
        function escapeHtml(str) { 
            if (!str) return ''; 
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); 
        }
        
        // ===== 时间转换函数（UTC → 北京时间）=====
       function formatTime(isoString) {
    if (!isoString) return '';
    // Supabase 返回的是 UTC 时间（带 Z 或不带）
    // 直接 new Date(isoString) 后，用 toLocaleString 转成北京时间
    const d = new Date(isoString);
    return d.toLocaleString('zh-CN', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
    }).replace(/\//g, '-');
}
        // ===== 模块注册 =====
        const modules = {};
        function registerModule(mod) { modules[mod.id] = mod; }

        // ===== 历史书模块 =====
        registerModule({
            id: 'book', name: '历史书', icon: '📖',
            _chapters: [],
            render(data) {
                this._chapters = data.chapters || [];
                if (this._chapters.length === 0) return '<div class="empty">暂无章节</div>';
                return `
                    <div class="book-layout">
                        <aside class="book-toc">
                            <h3>📚 目录</h3>
                            ${this._chapters.map((ch, idx) => `
                                <div class="toc-item" onclick="modules['book'].openChapter(${idx})">
                                    第${idx+1}章 ${escapeHtml(ch.title || '未命名')}
                                </div>
                            `).join('')}
                        </aside>
                        <article class="book-content" id="bookContent">
                            <div class="welcome-hint">📖 请从左侧目录选择章节</div>
                        </article>
                    </div>
                `;
            },
            init(data) { 
                this._chapters = data.chapters || []; 
                if (this._chapters.length > 0) this.openChapter(0); 
            },
            openChapter(idx) {
                const ch = this._chapters[idx];
                if (!ch) return;
                const el = document.getElementById('bookContent');
                if (!el) return;
                el.innerHTML = `
                    <h1>${escapeHtml(ch.title || '')}</h1>
                    ${ch.preface ? `<section class="bk-section preface"><h4>📋 课前导言</h4>${formatText(ch.preface)}</section>` : ''}
                    ${ch.body ? `<section class="bk-section body"><h4>📖 正文</h4>${formatText(ch.body)}</section>` : ''}
                    ${ch.exercises ? `<section class="bk-section exercises"><h4>📝 课后习题</h4>${formatText(ch.exercises)}</section>` : ''}
                    ${ch.extension ? `<section class="bk-section extension"><h4>🔗 知识扩展</h4>${formatText(ch.extension)}</section>` : ''}
                `;
                document.querySelectorAll('.toc-item').forEach((el, i) => el.classList.toggle('active', i === idx));
            }
        });

        // ===== 公告栏模块 =====
        registerModule({
            id: 'notice', name: '公告栏', icon: '📋',
            render(data) {
                const notices = data.notices || [];
                if (notices.length === 0) return '<div class="empty">📭 暂无公告</div>';
                return `
                    <div class="notice-list">
                        ${notices.map(n => `
                            <div class="notice-card">
                                <div class="notice-date">📅 ${n.date || ''}</div>
                                <h3 class="notice-title">${escapeHtml(n.title || '')}</h3>
                                <div class="notice-body">${formatText(n.content || '')}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        });

        // ===== 小说模块 =====
        registerModule({
            id: 'novel', name: '小说', icon: '📖',
            render(data) {
                const novels = data.novels || [];
                return `
                    <div class="generic-page">
                        <h1>📖 小说天地</h1>
                        <button class="btn-primary" onclick="showNovelForm()">📝 发布小说</button>
                        <div id="novelForm" style="display:none; margin:20px 0;"></div>
                        <div id="novelList">
                            ${novels.map(n => `
                                <div class="novel-card" id="novel-${n.id}">
                                    ${n.cover ? `<img class="novel-cover" src="${n.cover}" onclick="openOverlay('${n.cover}')" />` : ''}
                                    <div class="novel-info">
                                        <h3 class="novel-title">${escapeHtml(n.title || '无题')}</h3>
                                        <div class="novel-meta">
                                            <span>✍️ ${escapeHtml(n.author || '匿名')}</span>
                                            <span>👍 ${n.likes || 0}</span>
                                        </div>
                                        <div class="novel-intro">${escapeHtml(n.intro || '暂无简介')}</div>
                                        <div class="novel-actions">
                                            <button class="like-btn" onclick="likeNovel(${n.id})">👍 点赞</button>
                                            <button onclick="toggleNovelBody(${n.id})">📖 阅读</button>
                                        </div>
                                        <div class="novel-body" id="novelBody-${n.id}">${formatText(n.body || '')}</div>
                                    </div>
                                </div>
                            `).join('') || '<div class="empty">📚 暂无小说，快来发布吧！</div>'}
                        </div>
                    </div>
                `;
            }
        });

        function showNovelForm() {
            const el = document.getElementById('novelForm');
            if (!el) return;
            el.style.display = 'block';
            el.innerHTML = `
                <div class="editor-box">
                    <label>📝 小说标题</label>
                    <input id="novelTitle" placeholder="输入标题" />
                    <label>✍️ 作者昵称</label>
                    <input id="novelAuthor" placeholder="你的昵称" />
                    <label>📄 小说简介</label>
                    <textarea id="novelIntro" placeholder="一句话介绍..."></textarea>
                    <label>📖 小说正文</label>
                    <textarea id="novelBodyInput" class="big" placeholder="开始创作..."></textarea>
                    <div class="actions">
                        <button class="btn-primary" onclick="publishNovel()">📨 发布小说</button>
                        <button onclick="document.getElementById('novelForm').style.display='none'">取消</button>
                    </div>
                </div>
            `;
        }

        async function publishNovel() {
            const title = document.getElementById('novelTitle').value.trim();
            const author = document.getElementById('novelAuthor').value.trim() || '匿名';
            const intro = document.getElementById('novelIntro').value.trim();
            const body = document.getElementById('novelBodyInput').value.trim();
            if (!title || !body) return alert('请填写标题和正文');
            await supabaseRequest('novels', 'POST', { title, author, intro, body, cover: '', likes: 0, comments: [] });
            alert('🎉 小说发布成功！');
            location.reload();
        }

        async function likeNovel(id) {
            const novels = await supabaseRequest('novels') || [];
            const novel = novels.find(n => n.id === id);
            if (novel) {
                await supabaseRequest('novels', 'PATCH', { likes: (novel.likes || 0) + 1 }, id);
                const btn = document.querySelector(`#novel-${id} .like-btn`);
                if (btn) btn.innerHTML = `👍 ${novel.likes + 1}`;
            }
        }

        function toggleNovelBody(id) {
            const el = document.getElementById(`novelBody-${id}`);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        // ===== 创作投稿模块 =====
        registerModule({
            id: 'submit', name: '创作投稿', icon: '✍️',
            render() {
                return `
                    <div class="generic-page">
                        <h1>✍️ 创作投稿</h1>
                        <p style="color:#666;margin-bottom:20px;">📝 投稿新章节，审核通过后会发布到历史书。</p>
                        <div class="editor-box">
                            <label>👤 你的昵称</label>
                            <input id="submitNick" placeholder="匿名" />
                            <label>📖 章节标题</label>
                            <input id="submitTitle" placeholder="第X章 标题" />
                            <label>📋 课前导言</label>
                            <textarea id="submitPreface" placeholder="课前导言..."></textarea>
                            <label>📖 正文内容</label>
                            <textarea id="submitBody" class="big" placeholder="正文内容..."></textarea>
                            <label>📝 课后习题</label>
                            <textarea id="submitExercises" placeholder="课后习题..."></textarea>
                            <label>🔗 知识扩展</label>
                            <textarea id="submitExtension" placeholder="知识扩展..."></textarea>
                            <div class="actions" style="margin-top:16px;">
                                <button class="btn-primary" onclick="doSubmit()">📨 提交投稿</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        });

        async function doSubmit() {
            const nickname = document.getElementById('submitNick').value.trim() || '匿名';
            const title = document.getElementById('submitTitle').value.trim();
            const preface = document.getElementById('submitPreface').value.trim();
            const body = document.getElementById('submitBody').value.trim();
            const exercises = document.getElementById('submitExercises').value.trim();
            const extension = document.getElementById('submitExtension').value.trim();
            
            if (!title || !body) return alert('请填写章节标题和正文');
            
            await supabaseRequest('submissions', 'POST', {
                nickname,
                content: JSON.stringify({ title, preface, body, exercises, extension, images: [] }),
                status: 'pending'
            });
            
            alert('🎉 投稿成功！等待管理员审核。');
            location.reload();
        }

        // ===== 讨论板块 =====
        registerModule({
            id: 'discuss', name: '讨论', icon: '💬',
            render() {
                return `
                    <div class="generic-page">
                        <h1>💬 班级讨论</h1>
                        <div class="editor-box" style="margin-bottom:20px;">
                            <label>👤 你的昵称</label>
                            <input id="discNick" placeholder="匿名" />
                            <label>💬 说点什么...</label>
                            <textarea id="discContent" class="big" placeholder="分享你的想法..."></textarea>
                            <div class="actions">
                                <button class="btn-primary" onclick="postDiscussion()">📨 发布</button>
                            </div>
                        </div>
                        <div id="discussList"></div>
                    </div>
                `;
            },
            async init() {
                await loadDiscussions();
            }
        });

        async function loadDiscussions() {
            const list = await supabaseRequest('discussions') || [];
            document.getElementById('discussList').innerHTML = (list || []).map(d => `
                <div class="item-row">
                    <div>
                        <strong>👤 ${escapeHtml(d.nickname || '匿名')}</strong>
                        <span class="sugg-date">🕐 ${formatTime(d.created_at)}</span>
                        <div style="margin-top:8px; line-height: 1.8;">${escapeHtml(d.content)}</div>
                    </div>
                </div>
            `).join('') || '<div class="empty">💬 暂无讨论，来说两句吧！</div>';
        }

        async function postDiscussion() {
            const nickname = document.getElementById('discNick').value.trim() || '匿名';
            const content = document.getElementById('discContent').value.trim();
            if (!content) return alert('说点什么吧！');
            await supabaseRequest('discussions', 'POST', { nickname, content });
            alert('🎉 发布成功！');
            document.getElementById('discContent').value = '';
            await loadDiscussions();
        }

        // ===== 日常分享板块（小红书风格·支持本地图片+视频上传）=====
        registerModule({
            id: 'share', name: '日常分享', icon: '📸',
            render() {
                return `
                    <div class="generic-page">
                        <h1>📸 日常分享</h1>
                        <button class="btn-primary" onclick="showPostForm()">📝 发帖</button>
                        <div id="postForm" style="display:none; margin:20px 0;"></div>
                        <div id="postList"></div>
                    </div>
                `;
            },
            async init() {
                await loadPosts();
            }
        });

        function showPostForm() {
            const el = document.getElementById('postForm');
            if (!el) return;
            el.style.display = 'block';
            el.innerHTML = `
                <div class="editor-box">
                    <label>👤 你的昵称</label>
                    <input id="postNick" placeholder="匿名" />
                    <label>💬 说点什么...</label>
                    <textarea id="postContent" class="big" placeholder="分享你的日常..."></textarea>
                    
                    <label>🖼️ 上传图片（可选，可多选）</label>
                    <input type="file" id="postImageFiles" accept="image/*" multiple 
                           style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;" />
                    <div id="imagePreview" style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;"></div>
                    
                    <label>🎬 上传视频（可选）</label>
                    <input type="file" id="postVideoFile" accept="video/*" 
                           style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;" />
                    <div id="videoPreview" style="margin-top:10px;"></div>
                    
                    <div class="actions">
                        <button class="btn-primary" onclick="publishPost()">📨 发布</button>
                        <button onclick="document.getElementById('postForm').style.display='none'">取消</button>
                    </div>
                </div>
            `;
            
            // 图片预览
            document.getElementById('postImageFiles').addEventListener('change', function() {
                const preview = document.getElementById('imagePreview');
                preview.innerHTML = '';
                Array.from(this.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = e => {
                        preview.innerHTML += `<img src="${e.target.result}" style="height:80px;border-radius:6px;object-fit:cover;" />`;
                    };
                    reader.readAsDataURL(file);
                });
            });
            
            // 视频预览
            document.getElementById('postVideoFile').addEventListener('change', function() {
                const preview = document.getElementById('videoPreview');
                preview.innerHTML = '';
                if (this.files.length > 0) {
                    const file = this.files[0];
                    const reader = new FileReader();
                    reader.onload = e => {
                        preview.innerHTML = `<video controls style="width:100%;border-radius:8px;"><source src="${e.target.result}" type="video/mp4" /></video>`;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        async function publishPost() {
            const nickname = document.getElementById('postNick').value.trim() || '匿名';
            const content = document.getElementById('postContent').value.trim();
            
            // 读取图片文件并转成 Base64
            const fileInput = document.getElementById('postImageFiles');
            const imagePromises = Array.from(fileInput.files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            });
            const images = await Promise.all(imagePromises);
            
            // 读取视频文件并转成 Base64
            let video_url = null;
            const videoInput = document.getElementById('postVideoFile');
            if (videoInput.files.length > 0) {
                video_url = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(videoInput.files[0]);
                });
            }
            
            if (!content && images.length === 0 && !video_url) return alert('写点内容或上传图片/视频吧！');
            
            await supabaseRequest('posts', 'POST', { nickname, content, images, video_url, likes: 0 });
            alert('🎉 发布成功！');
            document.getElementById('postForm').style.display = 'none';
            await loadPosts();
        }

        async function loadPosts() {
            const posts = await supabaseRequest('posts') || [];
            const allComments = await supabaseRequest('comments') || [];
            
            document.getElementById('postList').innerHTML = (posts || []).map(p => {
                const postComments = allComments.filter(c => c.post_id === p.id);
                return `
                    <div class="post-card" id="post-${p.id}">
                        <div class="post-header">
                            <strong>👤 ${escapeHtml(p.nickname || '匿名')}</strong>
                            <span class="sugg-date">🕐 ${formatTime(p.created_at)}</span>
                        </div>
                        ${p.content ? `<div class="post-content">${escapeHtml(p.content)}</div>` : ''}
                        ${p.images && p.images.length > 0 ? `
                            <div class="post-images">
                                ${p.images.map(img => `<img src="${img}" onclick="openOverlay('${img}')" />`).join('')}
                            </div>
                        ` : ''}
                        ${p.video_url ? `
                            <div class="post-video">
                                <video controls style="width:100%;border-radius:8px;margin-top:10px;">
                                    <source src="${p.video_url}" type="video/mp4" />
                                </video>
                            </div>
                        ` : ''}
                        <div class="post-actions">
                            <button class="like-btn" onclick="likePost(${p.id})">❤️ 点赞 (${p.likes || 0})</button>
                            <button onclick="toggleComments(${p.id})">💬 评论 (${postComments.length})</button>
                        </div>
                        <div class="post-comments" id="comments-${p.id}" style="display:none;">
                            <div id="commentList-${p.id}">
                                ${postComments.map(c => `
                                    <div class="comment-item">
                                        <strong>${escapeHtml(c.nickname || '匿名')}</strong>
                                        <span class="sugg-date">🕐 ${formatTime(c.created_at)}</span>
                                        <div>${escapeHtml(c.content)}</div>
                                    </div>
                                `).join('')}
                            </div>
                            <div style="margin-top:10px;">
                                <input id="commentNick-${p.id}" placeholder="你的昵称" style="width:48%;padding:8px;" />
                                <input id="commentContent-${p.id}" placeholder="写评论..." style="width:48%;padding:8px;" />
                                <button class="btn-primary" style="padding:8px 16px;margin-top:6px;" onclick="addComment(${p.id})">发送</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') || '<div class="empty">📸 暂无分享，来发第一帖吧！</div>';
        }

        async function likePost(id) {
            const posts = await supabaseRequest('posts') || [];
            const post = posts.find(p => p.id === id);
            if (post) {
                await supabaseRequest('posts', 'PATCH', { likes: (post.likes || 0) + 1 }, id);
                await loadPosts();
            }
        }

        function toggleComments(id) {
            const el = document.getElementById(`comments-${id}`);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        async function addComment(postId) {
            const nickname = document.getElementById(`commentNick-${postId}`).value.trim() || '匿名';
            const content = document.getElementById(`commentContent-${postId}`).value.trim();
            if (!content) return alert('写点评论吧！');
            await supabaseRequest('comments', 'POST', { post_id: postId, nickname, content });
            alert('💬 评论成功！');
            await loadPosts();
        }

        // ===== 导航和路由 =====
        async function renderNav() {
            document.getElementById('mainNav').innerHTML = `
                <div class="nav-item active" onclick="switchModule('book')">📖 历史书</div>
                <div class="nav-item" onclick="switchModule('notice')">📋 公告栏</div>
                <div class="nav-item" onclick="switchModule('novel')">📖 小说</div>
                <div class="nav-item" onclick="switchModule('submit')">✍️ 投稿</div>
                <div class="nav-item" onclick="switchModule('discuss')">💬 讨论</div>
                <div class="nav-item" onclick="switchModule('share')">📸 日常</div>
            `;
        }

        function switchModule(modId) { location.hash = modId; }

        async function loadModule(modId) {
            const mod = modules[modId];
            if (!mod) { 
                document.getElementById('moduleContent').innerHTML = '<div class="empty">⚠️ 模块加载失败</div>'; 
                return; 
            }
            const [chapters, notices, novels, discussions, posts] = await Promise.all([
                supabaseRequest('chapters'),
                supabaseRequest('notices'),
                supabaseRequest('novels'),
                supabaseRequest('discussions'),
                supabaseRequest('posts')
            ]);
            const data = { 
                chapters: chapters || [], 
                notices: notices || [], 
                novels: novels || [], 
                discussions: discussions || [],
                posts: posts || []
            };
            document.getElementById('moduleContent').innerHTML = mod.render(data);
            if (mod.init) mod.init(data);
            document.querySelectorAll('.nav-item').forEach(el => 
                el.classList.toggle('active', el.textContent.includes(mod.name))
            );
        }

        window.addEventListener('hashchange', () => {
            const modId = location.hash.slice(1);
            if (modId && modules[modId]) loadModule(modId);
        });

        async function init() {
            await renderNav();
            const hash = location.hash.slice(1);
            if (hash && modules[hash]) loadModule(hash);
            else loadModule('book');
        }

        init();
    </script>
</body>
</html>
